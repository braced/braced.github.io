<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="braceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#48cae4"/>
      <stop offset="100%" stop-color="#0096c7"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect x="0" y="0" width="108" height="108" rx="22" fill="url(#bgGrad)"/>
  <!-- Subtle border -->
  <rect x="0.75" y="0.75" width="106.5" height="106.5" rx="21.5" fill="none" stroke="#1e1e1e" stroke-width="1.5"/>
  <!-- Brace icon scaled 1.5x, centered -->
  <path d="M 74 15 C 68 15 62 15 57 15 C 48 15 44 21 44 32 L 44 47 C 44 51 35 54 35 54 C 35 54 44 57 44 62 L 44 77 C 44 87 48 93 57 93 C 62 93 68 93 74 93"
        stroke="url(#braceGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
</svg>
